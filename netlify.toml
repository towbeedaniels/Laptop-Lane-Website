[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  # Exclude Next.js build output from secrets scanning
  # NEXT_PUBLIC_* keys are intentionally public and get bundled by webpack
  SECRETS_SCAN_OMIT_PATHS = ".next,.netlify,.netlify/functions-internal"

[[plugins]]
  package = "@netlify/plugin-nextjs"
